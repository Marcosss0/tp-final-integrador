apiVersion: v1
kind: Pod
metadata:
  name: nfs-test
  namespace: wordpress
spec:
  containers:
  - name: test
    image: busybox
    command:
      - sh
      - -c
      - |
        echo "NFS funcionando" > /data/test.txt
        sleep 3600
    volumeMounts:
    - name: nfs-storage
      mountPath: /data
  volumes:
  - name: nfs-storage
    persistentVolumeClaim:
      claimName: nfs-pvc
